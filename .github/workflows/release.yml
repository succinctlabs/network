name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup CI
        uses: ./.github/actions/setup

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          df -h

      - name: Patch SP1 Docker image with protobuf includes
        run: |
          docker pull ghcr.io/succinctlabs/sp1:v6.1.0
          echo 'FROM ghcr.io/succinctlabs/sp1:v6.1.0
          RUN apt-get update && apt-get install -y --no-install-recommends libprotobuf-dev && rm -rf /var/lib/apt/lists/*' \
            | docker build -t ghcr.io/succinctlabs/sp1:v6.1.0 -

      - name: Build RISC-V ELFs
        run: |
          ./x.sh --docker

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Upload ELFs to S3
        run: |
          aws s3 cp elf/spn-vapp-stf s3://spn-elfs/releases/${{ github.ref_name }}/spn-vapp-stf
          aws s3 cp elf/spn-vapp-aggregation s3://spn-elfs/releases/${{ github.ref_name }}/spn-vapp-aggregation

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            elf/spn-vapp-stf
            elf/spn-vapp-aggregation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}